name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install monorepo packages
        run: |
          pip install -e ".[dev,all]"
          pip install -e ./koraku_cloud

      - name: Cloud import guard
        run: python3 scripts/check_cloud_imports.py

      - name: Pytest
        run: python3 -m pytest -q

  sdk-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify SDK wheel excludes koraku_cloud
        run: ./scripts/verify-sdk-wheel.sh
