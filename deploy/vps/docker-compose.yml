# Koraku API + Redis on a VPS. TLS via **host** Caddy (see caddy-site.snippet).
# From repo root: docker compose -f deploy/vps/docker-compose.yml --env-file .env up -d --build
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      UVICORN_RELOAD: "false"
      WEB_CONCURRENCY: "1"
      REDIS_URL: redis://redis:6379/0
      SESSION_STORE_BACKEND: redis
      TRUSTED_PROXY_CIDRS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16,127.0.0.0/8"
    volumes:
      - koraku-data:/app/.koraku
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  koraku-data:
