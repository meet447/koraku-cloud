# Koraku Cloud — API + web + local Redis. See docs/SELF_HOST.md
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      UVICORN_RELOAD: "false"
      WEB_CONCURRENCY: "1"
      REDIS_URL: redis://redis:6379/0
      SESSION_STORE_BACKEND: redis
    volumes:
      - koraku-data:/app/.koraku
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      KORAKU_BACKEND_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  koraku-data:
